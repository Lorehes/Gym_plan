# ==============================
# GymPlan — Harness CI 기본 파이프라인
# ==============================
# Phase 0 의 최소 파이프라인:
#   1. checkout
#   2. Gradle 빌드 + 단위 테스트
#   3. (Phase 3 에서 image build / push 추가)
#
# Harness 전제:
#   - Project Identifier: gymplan
#   - Connector:          github_gymplan, dockerhub_gymplan (Phase 3 에서 사용)
#   - Codebase:           Git Connector + repoName 에서 자동 주입
#
# Cloud build infrastructure 사용 (별도 K8s 클러스터 불필요).

pipeline:
  name: gymplan-ci
  identifier: gymplan_ci
  projectIdentifier: gymplan
  orgIdentifier: default
  tags: {}

  properties:
    ci:
      codebase:
        connectorRef: github_gymplan
        repoName: gymplan
        build: <+input>

  stages:
    - stage:
        name: Build & Test
        identifier: build_and_test
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}

          execution:
            steps:
              # ───── Gradle 캐시 복원 ─────
              - step:
                  type: RestoreCacheGCS
                  name: Restore Gradle Cache
                  identifier: restore_gradle_cache
                  spec:
                    connectorRef: gcs_gymplan
                    bucket: gymplan-ci-cache
                    key: gradle-{{ checksum "build.gradle.kts" }}
                    archiveFormat: Tar
                  failureStrategies:
                    - onFailure:
                        errors: [AllErrors]
                        action:
                          type: Ignore   # 캐시 미스는 무시

              # ───── Gradle 빌드 ─────
              - step:
                  type: Run
                  name: Gradle Build
                  identifier: gradle_build
                  spec:
                    connectorRef: dockerhub_gymplan
                    image: eclipse-temurin:17-jdk
                    shell: Bash
                    command: |-
                      ./gradlew --no-daemon clean assemble

              # ───── 단위 테스트 ─────
              - step:
                  type: Run
                  name: Unit Tests
                  identifier: unit_tests
                  spec:
                    connectorRef: dockerhub_gymplan
                    image: eclipse-temurin:17-jdk
                    shell: Bash
                    command: |-
                      ./gradlew --no-daemon test
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - "**/build/test-results/test/*.xml"

              # ───── ktlint 검사 ─────
              - step:
                  type: Run
                  name: Ktlint Check
                  identifier: ktlint
                  spec:
                    connectorRef: dockerhub_gymplan
                    image: eclipse-temurin:17-jdk
                    shell: Bash
                    command: |-
                      ./gradlew --no-daemon ktlintCheck

              # ───── Gradle 캐시 저장 ─────
              - step:
                  type: SaveCacheGCS
                  name: Save Gradle Cache
                  identifier: save_gradle_cache
                  spec:
                    connectorRef: gcs_gymplan
                    bucket: gymplan-ci-cache
                    key: gradle-{{ checksum "build.gradle.kts" }}
                    sourcePaths:
                      - ~/.gradle/caches
                      - ~/.gradle/wrapper
                    archiveFormat: Tar
                  failureStrategies:
                    - onFailure:
                        errors: [AllErrors]
                        action:
                          type: Ignore

          sharedPaths:
            - /root/.gradle
