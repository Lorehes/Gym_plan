server:
  port: 8080

spring:
  application:
    name: api-gateway

  # ─── Reactive Redis (Rate Limit / 세션 조회 백엔드) ───
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s

  # ─── Spring Cloud Gateway ───
  cloud:
    gateway:
      # 전역 CORS 설정 (docs/context/security-guide.md §CORS)
      # 와일드카드 금지 — 화이트리스트만 사용.
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins:
              - "http://localhost:3000"        # 로컬 웹
              - "https://gymplan.io"           # 운영 웹
              - "capacitor://localhost"        # 모바일 WebView (Capacitor)
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - Accept
              - Origin
              - X-Requested-With
            allowCredentials: true
            maxAge: 3600

      # 라우팅 — 각 서비스는 컨테이너/Service 이름 기반 DNS 사용.
      # 로컬 docker-compose 가 아닌 환경에서는 환경변수로 override.
      routes:
        - id: user-service
          uri: ${ROUTE_USER_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**,/api/v1/users/**

        - id: plan-service
          uri: ${ROUTE_PLAN_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/plans/**,/api/v1/plans

        - id: exercise-catalog
          uri: ${ROUTE_EXERCISE_CATALOG_URI:http://localhost:8083}
          predicates:
            - Path=/api/v1/exercises/**,/api/v1/exercises

        - id: workout-service
          uri: ${ROUTE_WORKOUT_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/v1/sessions/**,/api/v1/sessions

        - id: analytics-service
          uri: ${ROUTE_ANALYTICS_SERVICE_URI:http://localhost:8085}
          predicates:
            - Path=/api/v1/analytics/**

        - id: notification-service
          uri: ${ROUTE_NOTIFICATION_SERVICE_URI:http://localhost:8086}
          predicates:
            - Path=/api/v1/notifications/**

# ─── GymPlan JWT 검증 (Gateway 는 발급자 아님 — publicKey 만 주입) ───
gymplan:
  jwt:
    issuer: gymplan
    public-key: ${JWT_PUBLIC_KEY}

  gateway:
    security:
      whitelist-paths:
        - /api/v1/auth/login
        - /api/v1/auth/register
        - /api/v1/auth/refresh
        - /actuator/health
        - /actuator/info
      # user-service 가 user:session:{userId} 를 채우기 시작하면 true 로 전환.
      # 현재 user-service 는 Refresh Token 만 Redis 에 저장하므로 false.
      session-check-enabled: false
    rate-limit:
      enabled: true
      ip-limit-per-min: 100
      user-limit-per-min: 300
      window: 1m

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.gymplan.gateway: INFO
    org.springframework.cloud.gateway: INFO
    reactor.netty: WARN
