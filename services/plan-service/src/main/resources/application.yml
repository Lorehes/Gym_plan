server:
  port: 8082

spring:
  application:
    name: plan-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/gymplan_plan?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USER:gymplan}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # 체육관 오픈 시간 버스트 트래픽 대응 (기본값 10 → 20으로 증가)
      # LazyConnectionDataSourceProxy와 함께 캐시 HIT 경로는 커넥션을 소비하지 않으므로
      # 실질적으로는 캐시 MISS + 다른 CRUD API 동시 처리 용량을 확보하는 역할
      maximum-pool-size: 20
      minimum-idle: 5
      # 풀 고갈 시 대기 시간 3초 → P99 < 200ms 목표 위반 전에 빠른 실패 유도
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: Asia/Seoul
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: plan-service
      namespace: gymplan-prod

logging:
  level:
    com.gymplan.plan: INFO
    org.hibernate.SQL: WARN
