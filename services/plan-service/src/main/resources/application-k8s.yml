# K8s 프로덕션 프로파일 — Vault Agent가 /vault/secrets/env.sh 에 시크릿 주입
# SPRING_PROFILES_ACTIVE=k8s 로 활성화

spring:
  datasource:
    url: jdbc:mysql://mysql.gymplan-prod.svc.cluster.local:3306/gymplan_plan?useSSL=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&requireSSL=true
    username: gymplan
    # DB_PASSWORD: Vault Agent가 env.sh 통해 주입
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000

  data:
    redis:
      host: redis.gymplan-prod.svc.cluster.local
      port: 6379
      # REDIS_PASSWORD: Vault Agent가 env.sh 통해 주입

  jpa:
    hibernate:
      ddl-auto: validate

# JWT_PUBLIC_KEY: Vault Agent가 env.sh 통해 주입

management:
  endpoint:
    health:
      show-details: never
