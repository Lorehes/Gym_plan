server:
  port: 8081

spring:
  application:
    name: user-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/gymplan_user?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DB_USER:gymplan}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s

# ─── GymPlan JWT 설정 ───
# publicKey / privateKey 는 Vault 를 통한 환경변수 주입만 허용 (하드코딩 금지).
gymplan:
  jwt:
    issuer: gymplan
    access-token-ttl: 30m
    refresh-token-ttl: 7d
    public-key: ${JWT_PUBLIC_KEY}
    private-key: ${JWT_PRIVATE_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: user-service
      namespace: gymplan-prod

logging:
  level:
    com.gymplan.user: INFO
    org.hibernate.SQL: WARN
