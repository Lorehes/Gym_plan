# K8s 프로덕션 프로파일 — Vault Agent가 /vault/secrets/env.sh 에 시크릿 주입
# SPRING_PROFILES_ACTIVE=k8s 로 활성화

spring:
  datasource:
    url: jdbc:mysql://mysql.gymplan-prod.svc.cluster.local:3306/gymplan_user?useSSL=true&serverTimezone=UTC&characterEncoding=UTF-8&requireSSL=true
    username: gymplan
    # DB_PASSWORD: Vault Agent가 env.sh 통해 주입

  data:
    redis:
      host: redis.gymplan-prod.svc.cluster.local
      port: 6379
      # REDIS_PASSWORD: Vault Agent가 env.sh 통해 주입

  jpa:
    hibernate:
      ddl-auto: validate   # 프로덕션에서 스키마 변경 금지

# JWT_PUBLIC_KEY, JWT_PRIVATE_KEY: Vault Agent가 env.sh 통해 주입

management:
  endpoint:
    health:
      show-details: never
