server:
  port: 8083

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  application:
    name: exercise-catalog

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/gymplan_exercise?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DB_USER:gymplan}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false

  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.gymplan.exercise: INFO
    org.hibernate.SQL: WARN
