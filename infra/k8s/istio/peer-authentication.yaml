# =============================================================================
# PeerAuthentication — gymplan-prod 네임스페이스 전체 mTLS STRICT 적용
#
# 목적:
#   서비스 간 통신을 모두 mTLS로 강제한다.
#   STRICT 모드에서는 평문(plain HTTP) 트래픽이 수신되면 거부된다.
#
# 아키텍처 근거 (docs/architecture/system-architecture.md):
#   "모든 서비스 간 통신은 Istio mTLS로 암호화"
#   "Istio mTLS 서비스 간 통신 암호화" (보안 필수사항)
#
# 적용 범위:
#   gymplan-prod 네임스페이스 안의 모든 워크로드 (6개 서비스 + api-gateway)
#   → 사이드카 인젝션이 활성화된 모든 Pod에 자동 적용
#
# 네임스페이스 레이블 전제조건:
#   kubectl label namespace gymplan-prod istio-injection=enabled
# =============================================================================

apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: gymplan-prod
  labels:
    app.kubernetes.io/part-of: gymplan
    app.kubernetes.io/managed-by: argocd
spec:
  mtls:
    mode: STRICT

---
# =============================================================================
# gymplan-infra 네임스페이스 — MySQL, Redis, MongoDB, ES, Kafka
#
# infra 서비스들은 JVM 서비스가 아니므로 사이드카 인젝션이 비활성화된 경우가 많다.
# PERMISSIVE 모드로 설정하여 mTLS 클라이언트와 평문 클라이언트를 모두 수용한다.
#
# 향후 개선: infra 서비스에도 사이드카를 붙여 STRICT 로 전환 가능.
# =============================================================================

apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: gymplan-infra
  labels:
    app.kubernetes.io/part-of: gymplan
    app.kubernetes.io/managed-by: argocd
spec:
  mtls:
    mode: PERMISSIVE
