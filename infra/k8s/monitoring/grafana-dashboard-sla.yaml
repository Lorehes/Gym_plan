apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-sla
  namespace: monitoring
data:
  sla-dashboard.json: |
    {
      "uid": "gymplan-sla",
      "title": "GymPlan — SLA 대시보드",
      "description": "서비스별 P95/P99 응답시간, 에러율, SLA 목표 달성 여부",
      "tags": ["gymplan", "sla"],
      "refresh": "30s",
      "time": { "from": "now-3h", "to": "now" },
      "timezone": "Asia/Seoul",
      "templating": {
        "list": [
          {
            "name": "service",
            "type": "query",
            "datasource": { "uid": "thanos" },
            "query": "label_values(http_server_requests_seconds_count{namespace=\"gymplan-prod\"}, service)",
            "multi": true,
            "includeAll": true,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "SLA 달성 현황",
          "type": "row",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 }
        },
        {
          "id": 2,
          "title": "가용성 (월간)",
          "type": "stat",
          "gridPos": { "x": 0, "y": 1, "w": 4, "h": 4 },
          "datasource": { "uid": "thanos" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": 0,     "color": "red" },
                  { "value": 0.999, "color": "green" }
                ]
              }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "expr": "1 - (sum(rate(http_server_requests_seconds_count{namespace=\"gymplan-prod\",status=~\"5..\"}[30d])) / sum(rate(http_server_requests_seconds_count{namespace=\"gymplan-prod\"}[30d])))",
              "legendFormat": "가용성"
            }
          ]
        },
        {
          "id": 3,
          "title": "전체 에러율 (1m)",
          "type": "stat",
          "gridPos": { "x": 4, "y": 1, "w": 4, "h": 4 },
          "datasource": { "uid": "thanos" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": 0,    "color": "green" },
                  { "value": 0.01, "color": "red" }
                ]
              }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{namespace=\"gymplan-prod\",status=~\"5..\"}[1m])) / sum(rate(http_server_requests_seconds_count{namespace=\"gymplan-prod\"}[1m]))",
              "legendFormat": "에러율"
            }
          ]
        },
        {
          "id": 4,
          "title": "plan-service P95 응답 (목표 < 200ms)",
          "type": "stat",
          "gridPos": { "x": 8, "y": 1, "w": 4, "h": 4 },
          "datasource": { "uid": "thanos" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": 0,   "color": "green" },
                  { "value": 0.2, "color": "red" }
                ]
              }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(http_server_requests_seconds_bucket{namespace=\"gymplan-prod\",service=\"plan-service\"}[5m])))",
              "legendFormat": "P95"
            }
          ]
        },
        {
          "id": 5,
          "title": "workout-service P95 응답 (목표 < 300ms)",
          "type": "stat",
          "gridPos": { "x": 12, "y": 1, "w": 4, "h": 4 },
          "datasource": { "uid": "thanos" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": 0,   "color": "green" },
                  { "value": 0.3, "color": "red" }
                ]
              }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(http_server_requests_seconds_bucket{namespace=\"gymplan-prod\",service=\"workout-service\"}[5m])))",
              "legendFormat": "P95"
            }
          ]
        },
        {
          "id": 6,
          "title": "exercise-catalog P95 응답 (목표 < 500ms)",
          "type": "stat",
          "gridPos": { "x": 16, "y": 1, "w": 4, "h": 4 },
          "datasource": { "uid": "thanos" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": 0,   "color": "green" },
                  { "value": 0.5, "color": "red" }
                ]
              }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(http_server_requests_seconds_bucket{namespace=\"gymplan-prod\",service=\"exercise-catalog\"}[5m])))",
              "legendFormat": "P95"
            }
          ]
        },
        {
          "id": 10,
          "title": "서비스별 P95 응답시간",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 5, "w": 12, "h": 8 },
          "datasource": { "uid": "thanos" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": 0,   "color": "green" },
                  { "value": 0.5, "color": "red" }
                ]
              }
            }
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (service, le) (rate(http_server_requests_seconds_bucket{namespace=\"gymplan-prod\",service=~\"$service\"}[5m])))",
              "legendFormat": "{{ service }} P95"
            }
          ]
        },
        {
          "id": 11,
          "title": "서비스별 P99 응답시간",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 5, "w": 12, "h": 8 },
          "datasource": { "uid": "thanos" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2 }
            }
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by (service, le) (rate(http_server_requests_seconds_bucket{namespace=\"gymplan-prod\",service=~\"$service\"}[5m])))",
              "legendFormat": "{{ service }} P99"
            }
          ]
        },
        {
          "id": 20,
          "title": "plan-service P95 — 목표선 200ms 포함",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 13, "w": 12, "h": 8 },
          "datasource": { "uid": "thanos" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2 }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "SLA 목표 (200ms)" },
                "properties": [
                  { "id": "custom.lineStyle", "value": { "dash": [8, 4], "fill": "dash" } },
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } },
                  { "id": "custom.lineWidth", "value": 1 }
                ]
              }
            ]
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(http_server_requests_seconds_bucket{namespace=\"gymplan-prod\",service=\"plan-service\"}[5m])))",
              "legendFormat": "plan-service P95"
            },
            {
              "expr": "0.2",
              "legendFormat": "SLA 목표 (200ms)"
            }
          ]
        },
        {
          "id": 21,
          "title": "서비스별 에러율 (5xx)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 13, "w": 12, "h": 8 },
          "datasource": { "uid": "thanos" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": { "lineWidth": 2 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": 0,    "color": "green" },
                  { "value": 0.01, "color": "red" }
                ]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "임계값 (1%)" },
                "properties": [
                  { "id": "custom.lineStyle", "value": { "dash": [8, 4], "fill": "dash" } },
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } },
                  { "id": "custom.lineWidth", "value": 1 }
                ]
              }
            ]
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "sum by (service) (rate(http_server_requests_seconds_count{namespace=\"gymplan-prod\",service=~\"$service\",status=~\"5..\"}[1m])) / sum by (service) (rate(http_server_requests_seconds_count{namespace=\"gymplan-prod\",service=~\"$service\"}[1m]))",
              "legendFormat": "{{ service }}"
            },
            {
              "expr": "0.01",
              "legendFormat": "임계값 (1%)"
            }
          ]
        },
        {
          "id": 30,
          "title": "서비스별 RPS (초당 요청수)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 21, "w": 24, "h": 7 },
          "datasource": { "uid": "thanos" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "lineWidth": 2 }
            }
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
          },
          "targets": [
            {
              "expr": "sum by (service) (rate(http_server_requests_seconds_count{namespace=\"gymplan-prod\",service=~\"$service\"}[1m]))",
              "legendFormat": "{{ service }}"
            }
          ]
        }
      ]
    }
