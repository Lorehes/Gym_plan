# ─────────────────────────────────────────────
# workout-service  (min 1 / max 10 — 피크 부하 집중)
# 세션 시작·세트 기록이 운동 시간대에 집중되므로 상한을 높게 설정
# ─────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: workout-service
  namespace: gymplan-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: workout-service
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        # 피크 대응: 한 번에 최대 3개씩 빠르게 증가
        - type: Pods
          value: 3
          periodSeconds: 60
