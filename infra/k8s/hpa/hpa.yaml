---
# ─────────────────────────────────────────────
# analytics-service  (min 1 / max 5)
# Kafka 소비 기반이므로 CPU 부하가 완만하게 증가
# ─────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: analytics-service
  namespace: gymplan-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: analytics-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      # Kafka Consumer 재배정(rebalance) 빈도 최소화를 위해 스케일 다운을 더 보수적으로
      stabilizationWindowSeconds: 600
      policies:
        - type: Pods
          value: 1
          periodSeconds: 180
---
# ─────────────────────────────────────────────
# notification-service  (min 1 / max 5)
# SSE 연결 수 기반 부하이므로 CPU보다 메모리가 주 병목이나
# CPU 70% 기준으로 우선 적용 (추후 custom metric 추가 가능)
# ─────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification-service
  namespace: gymplan-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      # SSE 연결이 열려 있는 Pod를 성급하게 종료하지 않도록 안정화 창 길게 설정
      stabilizationWindowSeconds: 600
      policies:
        - type: Pods
          value: 1
          periodSeconds: 180
