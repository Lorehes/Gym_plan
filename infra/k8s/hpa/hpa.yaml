# ═══════════════════════════════════════════════════════════════
# GymPlan — HPA (Horizontal Pod Autoscaler)
#
# 공통 정책:
#   - CPU 70% 이상 → 스케일 아웃
#   - 기본: min 1 / max 5
#   - workout-service, plan-service: min 1 / max 10 (피크 시간대 부하 집중)
#   - scaleUp:   즉시 반응 (stabilizationWindowSeconds: 0)
#   - scaleDown: 5분 안정화 (스케일 인/아웃 반복 thrashing 방지)
# ═══════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────
# api-gateway  (min 1 / max 5)
# ─────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  namespace: gymplan-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
