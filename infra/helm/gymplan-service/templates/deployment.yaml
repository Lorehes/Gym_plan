apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gymplan-service.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gymplan-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "gymplan-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gymplan-service.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "{{ .Values.service.port }}"
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.vault.enabled }}
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "{{ .Values.vault.role }}"
        vault.hashicorp.com/agent-init-first: "true"
        vault.hashicorp.com/agent-inject-secret-env.sh: "secret/gymplan/{{ trimPrefix "gymplan-" .Values.vault.role }}"
        vault.hashicorp.com/agent-inject-template-env.sh: |
          {{ .Values.vault.agentEnvTemplate | nindent 10 }}
        {{- if .Values.vault.fcmTemplate }}
        vault.hashicorp.com/agent-inject-secret-fcm-sa.json: "secret/gymplan/fcm"
        vault.hashicorp.com/agent-inject-template-fcm-sa.json: |
          {{ .Values.vault.fcmTemplate | nindent 10 }}
        {{- end }}
        {{- end }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default (include "gymplan-service.fullname" .) }}
      {{- end }}
      containers:
        - name: {{ include "gymplan-service.fullname" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.vault.enabled }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ -f /vault/secrets/env.sh ]; then
                . /vault/secrets/env.sh
              fi
              exec java ${JAVA_OPTS:-} -jar app.jar
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
