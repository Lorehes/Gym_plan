replicaCount: 1

image:
  repository: ""
  pullPolicy: IfNotPresent
  tag: "latest"

fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 60
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

env: []

envFrom: []

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: "/actuator/prometheus"
  prometheus.io/port: "{{ .Values.service.port }}"

serviceAccount:
  create: false
  name: ""

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

affinity: {}

tolerations: []

nodeSelector: {}

topologySpreadConstraints: []

vault:
  enabled: true
  role: gymplan-service
  # Consul Template 형식. infra/vault/agent-templates/{service}.env.tpl 참조.
  # Vault Agent가 /vault/secrets/env.sh 로 기록 → 컨테이너 시작 시 source.
  agentEnvTemplate: ""
  # notification-service 전용 FCM JSON 템플릿
  fcmTemplate: ""
