# ==============================
# GymPlan — E2E 테스트 환경
# ==============================
#
# 사용 방법 (수동):
#   1. 서비스 JAR 빌드
#      ./gradlew :services:user-service:bootJar \
#               :services:api-gateway:bootJar \
#               :services:plan-service:bootJar \
#               :services:exercise-catalog:bootJar
#
#   2. RSA 테스트 키 생성
#      ./scripts/gen-e2e-keys.sh      → .env.e2e 파일 생성
#
#   3. 스택 기동
#      docker compose -f infra/docker-compose/docker-compose.e2e.yml --env-file .env.e2e up -d
#
#   4. 테스트 실행
#      ./gradlew :e2e:test
#
#   5. 정리
#      docker compose -f infra/docker-compose/docker-compose.e2e.yml down -v
#
# 자동 실행 (Testcontainers ComposeContainer):
#   E2E 테스트가 ComposeContainer 로 자동 시작/종료합니다.
#   RSA 키는 테스트 코드에서 프로그래밍 방식으로 생성하여 환경변수로 전달합니다.
#
# 보안 정책:
#   - JWT_PUBLIC_KEY / JWT_PRIVATE_KEY — 테스트 전용, 런타임 생성 또는 .env.e2e 로 주입
#   - DB/Redis 비밀번호 — 테스트 전용 고정값, 절대 운영 환경에 사용 금지
#   - .env.e2e 는 .gitignore 처리됨

services:

  # ─── 인프라 ───────────────────────────────────────────────────

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-e2eroot}
      MYSQL_DATABASE: gymplan_user          # user-service 주 DB; 나머지는 init.sql 에서 생성
      MYSQL_USER: ${MYSQL_USER:-gymplan}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-e2epw}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    volumes:
      - ./e2e/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    command: ["sh", "-c", "redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-e2eredis}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    build:
      context: ./elasticsearch
      dockerfile: Dockerfile
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── 애플리케이션 서비스 ──────────────────────────────────────

  user-service:
    build:
      context: ../../services/user-service
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/gymplan_user?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
      DB_USER: ${MYSQL_USER:-gymplan}
      DB_PASSWORD: ${MYSQL_PASSWORD:-e2epw}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-e2eredis}
      # E2E 환경에서는 스키마 자동 생성 (운영은 validate)
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
      # RS256 키: 테스트 코드가 생성하여 withEnv() 로 전달
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  plan-service:
    build:
      context: ../../services/plan-service
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/gymplan_plan?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
      DB_USER: ${MYSQL_USER:-gymplan}
      DB_PASSWORD: ${MYSQL_PASSWORD:-e2epw}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-e2eredis}
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  exercise-catalog:
    build:
      context: ../../services/exercise-catalog
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    ports:
      - "8083:8083"       # 호스트에서 헬스체크 폴링용으로 노출 (E2E 전용)
    environment:
      DB_URL: jdbc:mysql://mysql:3306/gymplan_exercise?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
      DB_USER: ${MYSQL_USER:-gymplan}
      DB_PASSWORD: ${MYSQL_PASSWORD:-e2epw}
      ES_URIS: http://elasticsearch:9200
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  api-gateway:
    build:
      context: ../../services/api-gateway
      dockerfile: Dockerfile
    depends_on:
      user-service:
        condition: service_healthy
      plan-service:
        condition: service_healthy
      exercise-catalog:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"       # 호스트에서 접근 가능하도록 노출 (Testcontainers 가 재매핑)
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-e2eredis}
      # 다운스트림 서비스 URI — Docker 네트워크 내부 DNS
      ROUTE_USER_SERVICE_URI: http://user-service:8081
      ROUTE_PLAN_SERVICE_URI: http://plan-service:8082
      ROUTE_EXERCISE_CATALOG_URI: http://exercise-catalog:8083
      ROUTE_WORKOUT_SERVICE_URI: http://localhost:8084  # E2E 범위 외, 더미값
      ROUTE_ANALYTICS_SERVICE_URI: http://localhost:8085
      ROUTE_NOTIFICATION_SERVICE_URI: http://localhost:8086
      # Gateway 는 검증만 — publicKey 만 필요
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 50s
