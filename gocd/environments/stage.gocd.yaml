format_version: 10

# ─────────────────────────────────────────────
# GoCD Environment: gymplan-stage
# · Stage 배포에서 사용하는 환경변수를 중앙 관리
# · 시크릿 값은 Vault에서 런타임 주입 — 여기에는 키 이름만 선언
# ─────────────────────────────────────────────
environments:
  gymplan-stage:
    environment_variables:
      STAGE_NAMESPACE: gymplan-stage
      STAGE_GATEWAY_URL: https://stage.gymplan.internal
      ARGOCD_SERVER: argocd.gymplan.internal
      IMAGE_REGISTRY: ghcr.io/lorehes
      KUBE_CONTEXT_STAGE: gymplan-stage
    secure_variables:
      # 실제 값은 GoCD Admin → Environments → Secure Variables 에서 Vault 연동 설정
      ARGOCD_AUTH_TOKEN: "{{VAULT:secret/gocd/argocd-auth-token}}"
      KUBECONFIG: "{{VAULT:secret/gocd/kubeconfig-stage}}"
      SLACK_WEBHOOK_URL: "{{VAULT:secret/gocd/slack-webhook}}"
    pipelines:
      - gymplan-deploy
